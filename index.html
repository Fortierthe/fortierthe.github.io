<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compteur de Caisse</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-gray: #8E8E93;
            --ios-red: #FF3B30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 0;
            user-select: none;
        }

        header {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 20px;
            border-bottom: 1px solid #C6C6C8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            margin: 0;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--ios-gray);
            letter-spacing: 0.5px;
        }

        .total-display {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
        }

        .btn-reset {
            background-color: #E5E5EA;
            color: var(--ios-red);
            border: none;
            padding: 8px 15px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-reset:active {
            background-color: #D1D1D6;
        }

        .container {
            padding: 10px 15px 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 25px 5px 10px;
        }

        .card {
            background: var(--ios-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 0.5px solid #C6C6C8;
        }

        .row:last-child {
            border-bottom: none;
        }

        .val-info {
            flex: 1;
        }

        .val-name {
            font-size: 18px;
            font-weight: 600;
        }

        .val-subtotal {
            font-size: 13px;
            color: var(--ios-gray);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-step {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background-color: #F2F2F7;
            color: var(--ios-blue);
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-step:active {
            background-color: #E5E5EA;
        }

        input {
            width: 40px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            border: none;
            background: transparent;
            outline: none;
        }

        /* Enlever les flèches des inputs number */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1>Total Caisse</h1>
            <p class="total-display" id="grand-total">0,00 €</p>
        </div>
        <button class="btn-reset" onclick="resetAll()">Réinitialiser</button>
    </header>

    <div class="container">
        <div class="section-title">Pièces</div>
        <div class="card" id="coins-list"></div>

        <div class="section-title">Billets</div>
        <div class="card" id="bills-list"></div>
    </div>

    <script>
        const coins = [0.01, 0.02, 0.05, 0.10, 0.20, 0.50, 1, 2];
        const bills = [5, 10, 20, 50, 100, 200, 500];
        let data = {};

        function init() {
            renderSection('coins-list', coins);
            renderSection('bills-list', bills);
            updateDisplay();
        }

        function renderSection(id, values) {
            const container = document.getElementById(id);
            values.forEach(v => {
                data[v] = 0;
                const label = v >= 1 ? `${v} €` : `${(v*100).toFixed(0)} cts`;
                const div = document.createElement('div');
                div.className = 'row';
                div.innerHTML = `
                    <div class="val-info">
                        <div class="val-name">${label}</div>
                        <div class="val-subtotal" id="sub-${v}">0,00 €</div>
                    </div>
                    <div class="controls">
                        <button class="btn-step" onclick="change(${v}, -1)">-</button>
                        <input type="number" id="qty-${v}" value="0" inputmode="numeric" onchange="set(${v}, this.value)">
                        <button class="btn-step" onclick="change(${v}, 1)">+</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function change(v, delta) {
            data[v] = Math.max(0, data[v] + delta);
            updateDisplay();
        }

        function set(v, val) {
            data[v] = Math.max(0, parseInt(val) || 0);
            updateDisplay();
        }

        function resetAll() {
            if(confirm("Voulez-vous vraiment remettre la caisse à zéro ?")) {
                for (let v in data) data[v] = 0;
                updateDisplay();
            }
        }

        function updateDisplay() {
            let total = 0;
            for (let v in data) {
                const sub = v * data[v];
                total += sub;
                document.getElementById(`qty-${v}`).value = data[v];
                document.getElementById(`sub-${v}`).innerText = sub.toLocaleString('fr-FR', {style: 'currency', currency: 'EUR'});
            }
            document.getElementById('grand-total').innerText = total.toLocaleString('fr-FR', {style: 'currency', currency: 'EUR'});
        }

        window.onload = init;
    </script>
</body>
</html>
